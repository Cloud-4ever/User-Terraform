name: C4-Finder Terraform Scan And Deploy

on:
  push:
    branches:
      - main

jobs:
  inspect-and-wait:
    runs-on: ubuntu-latest
    outputs:
      decision: ${{ steps.wait.outputs.decision }}

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Collect terraform files
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          terraform_dir = Path("terraform")
          terraform_files = []

          if terraform_dir.exists():
              for path in terraform_dir.rglob("*.tf"):
                  if ".terraform" in path.parts:
                      continue
                  terraform_files.append({
                      "file": path.as_posix(),
                      "content": path.read_text(encoding="utf-8")
                  })

          commit_message = subprocess.check_output(
              ["git", "log", "-1", "--pretty=%B"],
              text=True,
              encoding="utf-8"
          ).strip()

          payload = {
              "repository": os.environ["GITHUB_REPOSITORY"],
              "repository_id": int(os.environ["GITHUB_REPOSITORY_ID"]),
              "event_name": os.environ["GITHUB_EVENT_NAME"],
              "ref": os.environ["GITHUB_REF"],
              "sha": os.environ["GITHUB_SHA"],
              "commit_message": commit_message,
              "actor": os.environ["GITHUB_ACTOR"],
              "terraform_files": terraform_files
          }

          with open("scan-payload.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False)
          PY

      - name: Trigger scan
        env:
          C4FINDER_API_URL: ${{ secrets.C4FINDER_API_URL }}
        shell: bash
        run: |
          curl --fail --show-error --location \
            -X POST "${C4FINDER_API_URL}/scan/trigger" \
            -H "Content-Type: application/json" \
            --data @scan-payload.json \
            -o scan-result.json

      - name: Read scan id
        id: scan
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os

          with open("scan-result.json", "r", encoding="utf-8") as f:
              result = json.load(f)

          scan_id = str(result["scan_id"])

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"scan_id={scan_id}\n")
          PY

      - name: Wait for user decision
        id: wait
        env:
          C4FINDER_API_URL: ${{ secrets.C4FINDER_API_URL }}
          SCAN_ID: ${{ steps.scan.outputs.scan_id }}
        shell: bash
        run: |
          for i in $(seq 1 60); do
            response=$(curl --fail --show-error --silent \
              "${C4FINDER_API_URL}/scan/${SCAN_ID}/decision")

            decision=$(python -c "import json,sys; print(json.loads(sys.argv[1]).get('decision','pending'))" "$response")

            echo "Current decision: $decision"

            if [ "$decision" = "approve" ] || [ "$decision" = "fix" ] || [ "$decision" = "reject" ]; then
              echo "decision=$decision" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            sleep 30
          done

          echo "decision=timeout" >> "$GITHUB_OUTPUT"

      - name: Trigger fix
        if: steps.wait.outputs.decision == 'fix'
        env:
          C4FINDER_API_URL: ${{ secrets.C4FINDER_API_URL }}
          SCAN_ID: ${{ steps.scan.outputs.scan_id }}
        run: |
          curl --fail --show-error --location \
            -X POST "${C4FINDER_API_URL}/fix/trigger" \
            -H "Content-Type: application/json" \
            -d "{\"scan_id\": \"${SCAN_ID}\"}"

      - name: Stop after remediation push
        if: steps.wait.outputs.decision == 'fix'
        run: exit 0

      - name: Reject deployment
        if: steps.wait.outputs.decision == 'reject' || steps.wait.outputs.decision == 'timeout'
        run: exit 1

  deploy:
    runs-on: ubuntu-latest
    needs: inspect-and-wait
    if: needs.inspect-and-wait.outputs.decision == 'approve'
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
